[project]
name = "tscglue"
version = "0.1.0"
description = "Automatic Time Series Classification"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "polars>=1.38.0",
    "scikit-learn",
    "tqdm",
    "aeon[dl]>=1.3.0",
    "tensorflow>=2.14",
    "seaborn",
    "torch",
    "torchvision",
    "pytorch-lightning",
    "tabpfn",
    "huggingface-hub",
    "tsfresh",
    "ray",
    "catboost",
    "imblearn",
    "click",
    "pyarrow",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "isort",
    "pytest",
    "s3fs",
    "boto3",
    "awscli",
    "moto[s3]",
    # "datasets<3.0.0"
]
notebooks = [
    "jupyter",
    "jupyterlab",
    "ipykernel",
    "hvplot"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tscglue"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["N803", "N806"]

[tool.isort]
profile = "black"
line_length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.uv.sources]
torch = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
